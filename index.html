<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lexicon</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lexicon">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#F5F2E8" id="themeColorMeta">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Work+Sans:wght@400;500;600&display=swap');

  /* ── Reset ─────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #F5F2E8;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body.is-dusk { background: #1B1916; }

  /* The app fills the viewport; on wide screens it's a centered phone column. */
  #root {
    height: 100dvh;
    display: flex; justify-content: center;
    background: var(--bg, #F5F2E8);
  }
  @media (min-width: 560px) {
    #root { padding: 24px 0; background: #2b2824; }
    .lex-app { max-width: 420px; border-radius: 30px; overflow: hidden;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,0.55); }
  }

  /* ── Theme tokens (base = Manuscript) ─────────────────────── */
  .lex-app {
    --tint: 34,31,24;
    --bg: #F5F2E8;
    --ink: #221F18;
    --ink2: #5b554a;
    --muted: #9b958a;
    --card: #FFFFFF;
    --gold: #C8A02A;   --gold-rgb: 200,160,42;
    --amber: #97681A;  --amber-rgb: 151,104,26;
    --green: #3C6B52;  --green-rgb: 60,107,82;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Work Sans', -apple-system, system-ui, sans-serif;
    --radius: 26px;
    --card-border: rgba(var(--tint), 0.05);
    --card-shadow: 0 1px 2px rgba(var(--tint),0.04), 0 18px 40px -22px rgba(var(--tint),0.28);
    --glass: rgba(245,242,232,0.82);
    --chip-on-bg: var(--ink);
    --chip-on-fg: var(--bg);
    --line: rgba(var(--tint), 0.10);
    --line-soft: rgba(var(--tint), 0.06);
  }

  /* Dusk — dark, warm espresso, antique gold, night reading */
  .lex-app.t-dusk {
    --tint: 236,229,214;
    --bg: #1B1916;
    --ink: #ECE5D6;
    --ink2: #a59e8d;
    --muted: #7c7567;
    --card: #262320;
    --gold: #D4AF37;   --gold-rgb: 212,175,55;
    --amber: #CDA15A;  --amber-rgb: 205,161,90;
    --green: #82B59A;  --green-rgb: 130,181,154;
    --radius: 26px;
    --card-border: rgba(var(--tint), 0.09);
    --card-shadow: 0 24px 48px -26px rgba(0,0,0,0.7);
    --glass: rgba(27,25,22,0.8);
  }

  /* ── App shell ─────────────────────────────────────────────── */
  .lex-app {
    flex: 1; min-width: 0;
    height: 100%; width: 100%; overflow: hidden;
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--ink);
    position: relative;
    font-family: var(--sans);
  }
  .lex-app button { font-family: var(--sans); cursor: pointer; border: none; background: none; color: inherit; }
  .lex-body { flex: 1; min-height: 0; min-width: 0; display: flex; }
  .lex-screen {
    flex: 1; min-height: 0; min-width: 0;
    display: none; flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 2px) 20px 0;
  }
  .lex-screen.on { display: flex; }

  /* ── Study: header ─────────────────────────────────────────── */
  .lex-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 2px 8px;
  }
  .lex-wordmark {
    font-family: var(--serif); font-weight: 600;
    font-size: 26px; letter-spacing: 0.22em; color: var(--ink);
    padding-left: 0.22em;
  }

  /* ── Study: progress strip ─────────────────────────────────── */
  .lex-progress { padding: 4px 2px 12px; }
  .lex-bar {
    height: 6px; border-radius: 99px; background: rgba(var(--tint),0.07);
    display: flex; overflow: hidden;
  }
  .lex-bar-known { background: var(--green); transition: width .5s ease; }
  .lex-bar-learning { background: var(--amber); opacity: .8; transition: width .5s ease; }
  .lex-stats {
    display: flex; align-items: center; gap: 9px; margin-top: 9px;
    font-size: 12px; letter-spacing: 0.04em; color: var(--ink2);
    text-transform: lowercase;
  }
  .lex-stats b {
    font-family: var(--serif); font-weight: 600; font-size: 15px;
    font-feature-settings: "onum" 1; color: var(--ink); margin-right: 2px;
  }
  .lex-stats .dot { width: 3px; height: 3px; border-radius: 99px; background: var(--muted); opacity: .5; }

  /* ── Study: chips ──────────────────────────────────────────── */
  .lex-chips { display: flex; align-items: stretch; gap: 8px; padding: 4px 0 10px; }
  .lex-chip {
    padding: 9px 15px; border-radius: 99px;
    border: 1px solid var(--line); background: transparent; color: var(--ink2);
    font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
    transition: all .18s ease; white-space: nowrap;
  }
  .lex-chip:active { transform: scale(0.96); }
  .lex-chip.on { background: var(--chip-on-bg); color: var(--chip-on-fg); border-color: var(--chip-on-bg); }
  /* Segmented filter control: horizontally scrollable options */
  .lex-filters {
    flex: 1; min-width: 0; display: flex; gap: 4px; padding: 4px; border-radius: 99px;
    background: rgba(var(--tint), 0.05); border: 1px solid var(--line-soft);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .lex-filters::-webkit-scrollbar { display: none; }
  .lex-filters .lex-chip {
    flex: 0 0 auto; padding: 8px 16px; text-align: center; border: none;
  }
  .lex-chip-icon {
    flex: 0 0 auto; width: 46px; padding: 0;
    display: flex; align-items: center; justify-content: center; color: var(--ink2);
    border: 1px solid var(--line); border-radius: 14px;
    background: rgba(var(--tint), 0.04); transition: all .18s ease;
  }
  .lex-chip-icon:active { transform: scale(0.94); color: var(--ink); background: rgba(var(--tint), 0.09); }
  /* Active "random mode" — gold accent */
  .lex-chip-icon.on {
    color: var(--gold);
    border-color: rgba(var(--gold-rgb), 0.55);
    background: rgba(var(--gold-rgb), 0.12);
  }

  /* ── Study: card ───────────────────────────────────────────── */
  .lex-cardarea { flex: 1; min-height: 0; display: flex; padding: 8px 0 2px; }
  .lex-card-wrap { flex: 1; perspective: 1600px; cursor: pointer; }
  .lex-card {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,.05,.2,1);
  }
  .lex-card.is-flipped { transform: rotateY(180deg); }
  .lex-face {
    position: absolute; inset: 0;
    -webkit-backface-visibility: hidden; backface-visibility: hidden;
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--card-shadow); border: 1px solid var(--card-border);
    display: flex; flex-direction: column; padding: 20px 22px 18px;
  }
  .lex-back { transform: rotateY(180deg); }
  .lex-card-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .lex-badge {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; padding: 5px 10px; border-radius: 99px;
  }
  .lex-back-word {
    font-family: var(--serif); font-style: italic; font-size: 20px;
    color: var(--muted); font-weight: 500;
  }
  .lex-card-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 6px;
  }
  .lex-word {
    font-family: var(--serif); font-weight: 500; font-size: 46px;
    line-height: 1.04; color: var(--ink); letter-spacing: 0.005em;
  }
  .lex-pos { font-family: var(--serif); font-style: italic; font-size: 19px; color: var(--muted); }
  .lex-pron { font-size: 13px; color: var(--muted); letter-spacing: 0.02em; margin-top: 2px; }
  .lex-back-body { gap: 16px; padding: 6px 4px; }
  .lex-def {
    font-family: var(--serif); font-size: 27px; line-height: 1.22;
    color: var(--ink); font-weight: 500; text-wrap: pretty;
  }
  .lex-rule { width: 46px; height: 1px; background: var(--line); }
  .lex-example {
    font-family: var(--serif); font-style: italic; font-size: 20px;
    line-height: 1.34; color: var(--ink2); text-wrap: pretty;
  }
  .lex-card-foot { display: flex; align-items: center; justify-content: space-between; }
  .lex-speak {
    width: 38px; height: 38px; border-radius: 99px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink2); background: rgba(var(--tint),0.045); transition: all .18s ease;
  }
  .lex-speak:active { transform: scale(0.9); background: rgba(var(--tint),0.09); }
  .lex-speak.speaking { color: var(--green); background: rgba(var(--green-rgb),0.12); }
  .lex-hint {
    font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  }

  /* ── Star ──────────────────────────────────────────────────── */
  .lex-star {
    color: var(--muted); padding: 4px; margin: -4px -4px 0 0;
    display: flex; transition: color .2s ease, transform .2s ease; position: relative;
  }
  .lex-star.on { color: var(--gold); }
  .lex-star:active { transform: scale(0.85); }
  .lex-star.sm { padding: 6px; margin: 0; }
  .lex-star.pop { animation: starpop .5s cubic-bezier(.3,1.4,.5,1); }
  @keyframes starpop {
    0% { transform: scale(1); }
    35% { transform: scale(1.35) rotate(-8deg); }
    60% { transform: scale(0.92) rotate(4deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .lex-star.pop::after {
    content: ''; position: absolute; inset: -6px; border-radius: 99px;
    border: 2px solid var(--gold); animation: starring .5s ease-out forwards;
  }
  @keyframes starring {
    0% { transform: scale(0.5); opacity: .7; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  /* ── Study: actions ────────────────────────────────────────── */
  .lex-actions { display: flex; gap: 12px; padding: 4px 0 0; }
  .lex-act {
    flex: 1; padding: 17px 0; border-radius: 16px;
    font-size: 16px; font-weight: 600; letter-spacing: 0.01em;
    background: var(--card); border: 1.5px solid; transition: all .15s ease;
  }
  .lex-act:active { transform: scale(0.97); }
  .lex-act.learning { color: var(--amber); border-color: rgba(var(--amber-rgb),0.45); }
  .lex-act.learning:active { background: rgba(var(--amber-rgb),0.08); }
  .lex-act.known { color: var(--green); border-color: rgba(var(--green-rgb),0.45); }
  .lex-act.known:active { background: rgba(var(--green-rgb),0.08); }
  .lex-nav { display: flex; justify-content: center; gap: 36px; padding: 13px 0 12px; }
  .lex-nav button {
    display: flex; align-items: center; gap: 7px; color: var(--muted);
    font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .lex-nav button:active { color: var(--ink); }
  .lex-nav button:disabled { opacity: 0.35; }

  /* ── List screens (Browse / Fav / Progress) ────────────────── */
  .lex-list-screen { padding-top: 60px; }
  .lex-page-head { padding: 8px 4px 14px; }
  .lex-page-head h1 {
    font-family: var(--serif); font-weight: 600; font-size: 38px;
    margin: 0; color: var(--ink); letter-spacing: 0.01em;
  }
  .lex-page-head p {
    margin: 3px 0 0; font-size: 13px; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .lex-searchbar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(var(--tint),0.045); border-radius: 13px;
    padding: 11px 14px; margin-bottom: 6px;
  }
  .lex-search-ico { color: var(--muted); display: flex; }
  .lex-searchbar input {
    flex: 1; border: none; background: none; outline: none;
    font-family: var(--sans); font-size: 15px; color: var(--ink);
  }
  .lex-searchbar input::placeholder { color: var(--muted); }
  .lex-scroll { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 0 16px; }
  .lex-scroll::-webkit-scrollbar { width: 0; }

  .lex-row {
    display: flex; align-items: center; gap: 13px;
    padding: 15px 6px; border-bottom: 1px solid var(--line-soft);
    cursor: pointer; transition: background .15s ease;
  }
  .lex-row:active { background: rgba(var(--tint),0.03); }
  .lex-row-dot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; }
  .lex-row-main { flex: 1; min-width: 0; }
  .lex-row-word {
    font-family: var(--serif); font-weight: 600; font-size: 22px; color: var(--ink); line-height: 1.1;
  }
  .lex-row-def {
    font-size: 13px; color: var(--ink2); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lex-empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

  .lex-fav-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding-bottom: 60px;
  }
  .lex-fav-star { color: var(--gold); opacity: .5; margin-bottom: 16px; }
  .lex-fav-empty-t { font-family: var(--serif); font-size: 26px; color: var(--ink); }
  .lex-fav-empty-s { font-size: 14px; color: var(--muted); margin-top: 6px; max-width: 220px; line-height: 1.4; }

  /* ── Progress ──────────────────────────────────────────────── */
  .lex-progress-scroll { display: flex; flex-direction: column; align-items: center; }
  .lex-ring-wrap { position: relative; margin: 20px 0 14px; }
  .lex-ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .lex-ring-pct {
    font-family: var(--serif); font-weight: 600; font-size: 52px; color: var(--ink);
    font-feature-settings: "onum" 1; line-height: 1;
  }
  .lex-ring-pct span { font-size: 26px; color: var(--muted); }
  .lex-ring-sub {
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-top: 4px;
  }
  .lex-pstats { display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px 0; gap: 4px; }
  .lex-pstat { flex: 1; text-align: center; }
  .lex-pstat-n {
    font-family: var(--serif); font-weight: 600; font-size: 40px;
    font-feature-settings: "onum" 1; line-height: 1;
  }
  .lex-pstat-l {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-top: 6px;
  }
  .lex-pdiv { width: 1px; height: 40px; background: var(--line); }
  .lex-streak {
    width: 100%; background: var(--card); border-radius: 18px;
    border: 1px solid var(--card-border); box-shadow: var(--card-shadow);
    padding: 4px 18px; margin-top: 8px;
  }
  .lex-streak-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 0; border-bottom: 1px solid var(--line-soft);
    font-size: 15px; color: var(--ink2);
  }
  .lex-streak-row:last-child { border-bottom: none; }
  .lex-streak-row b {
    font-family: var(--serif); font-weight: 600; font-size: 19px; color: var(--ink);
    font-feature-settings: "onum" 1; white-space: nowrap; padding-left: 16px;
  }

  /* ── Appearance toggle (Progress) ──────────────────────────── */
  .lex-appearance { width: 100%; margin-top: 20px; }
  .lex-appearance-label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); padding: 0 4px 9px;
  }
  .lex-seg {
    display: flex; gap: 4px; padding: 4px;
    background: rgba(var(--tint),0.05); border-radius: 14px;
  }
  .lex-seg-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 12px 0; border-radius: 10px; color: var(--ink2);
    font-size: 14px; font-weight: 500; transition: all .2s ease;
  }
  .lex-seg-btn.on {
    background: var(--card); color: var(--ink);
    box-shadow: 0 1px 2px rgba(var(--tint),0.06), 0 6px 16px -10px rgba(var(--tint),0.4);
  }

  /* ── Tab bar ───────────────────────────────────────────────── */
  .lex-tabbar {
    display: flex; align-items: flex-start; justify-content: space-around;
    padding: 8px 8px calc(4px + env(safe-area-inset-bottom));
    background: var(--glass);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-top: 1px solid var(--line-soft); flex-shrink: 0;
  }
  .lex-tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--muted); flex: 1; transition: color .18s ease; padding: 2px 0;
  }
  .lex-tab.on { color: var(--ink); }
  .lex-tab-ico { position: relative; display: flex; height: 24px; align-items: center; }
  .lex-tab-label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.02em; }
  .lex-tab-badge {
    position: absolute; top: -4px; right: -9px;
    min-width: 16px; height: 16px; padding: 0 4px; border-radius: 99px;
    background: var(--gold); color: #fff; font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px var(--bg);
  }
</style>
</head>
<body>

<div id="root">
  <div class="lex-app t-manuscript" id="app">
    <div class="lex-body">

      <!-- ── STUDY ─────────────────────────────────────────── -->
      <div class="lex-screen on" id="studyScreen">
        <header class="lex-header">
          <div class="lex-wordmark">LEXICON</div>
        </header>

        <div class="lex-progress">
          <div class="lex-bar">
            <div class="lex-bar-known" id="barKnown" style="width:0%"></div>
            <div class="lex-bar-learning" id="barLearning" style="width:0%"></div>
          </div>
          <div class="lex-stats">
            <span><b id="statKnown">0</b> known</span>
            <span class="dot"></span>
            <span><b id="statLearning">0</b> learning</span>
            <span class="dot"></span>
            <span><b id="statLeft">0</b> left</span>
          </div>
        </div>

        <div class="lex-chips" id="filterChips">
          <div class="lex-filters">
            <button class="lex-chip on" data-filter="all">All</button>
            <button class="lex-chip" data-filter="favorites">Favorites</button>
            <button class="lex-chip" data-filter="new">New</button>
            <button class="lex-chip" data-filter="learning">Learning</button>
          </div>
          <button class="lex-chip-icon" id="shuffleBtn" aria-label="Shuffle"></button>
        </div>

        <div class="lex-cardarea">
          <div class="lex-card-wrap" id="cardWrap">
            <div class="lex-card" id="flashcard">
              <!-- FRONT -->
              <div class="lex-face lex-front">
                <div class="lex-card-top">
                  <span class="lex-badge" id="frontBadge">New</span>
                  <button class="lex-star" id="frontStar" aria-label="Favorite"></button>
                </div>
                <div class="lex-card-body">
                  <div class="lex-word" id="cardWord">—</div>
                  <div class="lex-pos" id="cardPos"></div>
                  <div class="lex-pron" id="cardPron"></div>
                </div>
                <div class="lex-card-foot">
                  <button class="lex-speak" id="frontSpeak" aria-label="Pronounce"></button>
                  <span class="lex-hint">Tap to reveal</span>
                </div>
              </div>
              <!-- BACK -->
              <div class="lex-face lex-back">
                <div class="lex-card-top">
                  <span class="lex-back-word" id="cardWordBack">—</span>
                  <button class="lex-star" id="backStar" aria-label="Favorite"></button>
                </div>
                <div class="lex-card-body lex-back-body">
                  <div class="lex-def" id="cardDef">—</div>
                  <div class="lex-rule"></div>
                  <div class="lex-example" id="cardExample"></div>
                </div>
                <div class="lex-card-foot">
                  <button class="lex-speak" id="backSpeak" aria-label="Pronounce"></button>
                  <span class="lex-hint">Tap to flip back</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="lex-actions">
          <button class="lex-act learning" id="markLearning">Still Learning</button>
          <button class="lex-act known" id="markKnown">Know It</button>
        </div>
        <div class="lex-nav">
          <button id="prevBtn"></button>
          <button id="skipBtn"></button>
        </div>
      </div>

      <!-- ── BROWSE ────────────────────────────────────────── -->
      <div class="lex-screen lex-list-screen" id="browseScreen">
        <header class="lex-page-head">
          <h1>Browse</h1>
          <p><span id="browseCount">0</span> words in your session</p>
        </header>
        <div class="lex-searchbar">
          <span class="lex-search-ico" id="searchIco"></span>
          <input id="searchBox" placeholder="Search words or meanings" autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="lex-scroll" id="browseList"></div>
      </div>

      <!-- ── FAVORITES ─────────────────────────────────────── -->

// ── State ─────────────────────────────────────────────────────
const LS_KEY = 'lexicon_state_v2';
const DECK_TOTAL = VOCAB.length;
const byWord = Object.fromEntries(VOCAB.map(w => [w.word, w]));

function defaultState() {
  return {
    words: {}, favs: [], order: null, shuffled: false,
    sessions: 0, streak: 0, lastDate: null,
    reviewedToday: 0, reviewedDate: null,
    appearance: null, firstUsed: new Date().toISOString(),
  };
}
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (saved && typeof saved === 'object') return Object.assign(defaultState(), saved);
  } catch (e) {}
  return defaultState();
}
function saveState() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

let state = loadState();

// Resolve first-launch appearance from the OS preference.
if (!state.appearance) {
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  state.appearance = prefersDark ? 'dusk' : 'manuscript';
}

// Transient UI state
let tab = 'study';
let filter = 'all';
let flipped = false;
let currentIndex = 0;
let searchTerm = '';
let favTimer = null;

// ── Helpers ───────────────────────────────────────────────────
function getStatus(word) { return (state.words[word] && state.words[word].status) || 'new'; }
function setStatus(word, status) {
  const ws = state.words[word] || { seen: 0, lastSeen: null };
  ws.status = status; ws.seen = (ws.seen || 0) + 1; ws.lastSeen = new Date().toISOString();
  state.words[word] = ws; saveState();
}
function isFav(word) { return state.favs.indexOf(word) !== -1; }
function toggleFav(word) {
  const i = state.favs.indexOf(word);
  if (i === -1) state.favs.push(word); else state.favs.splice(i, 1);
  saveState();
}
function getOrder() {
  if (!Array.isArray(state.order) || state.order.length !== VOCAB.length) {
    state.order = VOCAB.map(w => w.word);
  }
  return state.order;
}
function counts() {
  let known = 0, learning = 0;
  VOCAB.forEach(w => {
    const s = getStatus(w.word);
    if (s === 'known') known++; else if (s === 'learning') learning++;
  });
  return { known, learning, remaining: DECK_TOTAL - known - learning };
}
function buildDeck() {
  const live = getOrder().map(word => byWord[word]).filter(Boolean);
  const deck = live.filter(w => {
    if (filter === 'new') return getStatus(w.word) === 'new';
    if (filter === 'learning') return getStatus(w.word) === 'learning';
    if (filter === 'favorites') return isFav(w.word);
    return true;
  });
  return deck.length ? deck : live;
}
function currentDeck() {
  const deck = buildDeck();
  if (currentIndex > deck.length - 1) currentIndex = Math.max(0, deck.length - 1);
  return deck;
}

// ── Theme ─────────────────────────────────────────────────────
function applyTheme() {
  const app = document.getElementById('app');
  app.className = 'lex-app t-' + state.appearance;
  const dark = state.appearance === 'dusk';
  document.body.classList.toggle('is-dusk', dark);
  document.getElementById('themeColorMeta').setAttribute('content', dark ? '#1B1916' : '#F5F2E8');
  document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]')
    .setAttribute('content', dark ? 'black-translucent' : 'default');
  document.getElementById('segLight').innerHTML = Icon.sun() + ' Light';
  document.getElementById('segDark').innerHTML = Icon.moon() + ' Dark';
  document.getElementById('segLight').classList.toggle('on', !dark);
  document.getElementById('segDark').classList.toggle('on', dark);
}
function setTheme(name) {
  state.appearance = name; saveState(); applyTheme();
}

// ── Speech ────────────────────────────────────────────────────
let preferredVoice = null;
function loadVoice() {
  const voices = speechSynthesis.getVoices();
  preferredVoice = voices.find(v => v.name.includes('Google US English'))
    || voices.find(v => v.name.includes('Google UK English'))
    || voices.find(v => /english/i.test(v.name) && v.lang.startsWith('en'));
}
if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }
function speak(word, btn) {
  if (!('speechSynthesis' in window) || !word) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  if (preferredVoice) u.voice = preferredVoice;
  u.rate = 0.92;
  if (btn) {
    btn.classList.add('speaking');
    u.onend = u.onerror = () => btn.classList.remove('speaking');
  }
  speechSynthesis.speak(u);
}

// ── Streak / review tracking ─────────────────────────────────
function recordReview() {
  const today = new Date().toISOString().split('T')[0];
  if (state.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    state.streak = (state.lastDate === yesterday) ? state.streak + 1 : 1;
    state.lastDate = today;
    state.sessions++;
  }
  if (state.reviewedDate !== today) { state.reviewedDate = today; state.reviewedToday = 0; }
  state.reviewedToday++;
  saveState();
}

// ── Render: Study ─────────────────────────────────────────────
function renderStudy() {
  const deck = currentDeck();
  const entry = deck[currentIndex];

  document.querySelectorAll('#filterChips .lex-chip[data-filter]').forEach(b => {
    b.classList.toggle('on', b.dataset.filter === filter);
  });
  const shuffleBtn = document.getElementById('shuffleBtn');
  shuffleBtn.classList.toggle('on', !!state.shuffled);
  shuffleBtn.setAttribute('aria-pressed', state.shuffled ? 'true' : 'false');

  const c = counts();
  document.getElementById('statKnown').textContent = c.known;
  document.getElementById('statLearning').textContent = c.learning;
  document.getElementById('statLeft').textContent = c.remaining;
  document.getElementById('barKnown').style.width = (c.known / DECK_TOTAL * 100) + '%';
  document.getElementById('barLearning').style.width = (c.learning / DECK_TOTAL * 100) + '%';

  const card = document.getElementById('flashcard');
  card.classList.toggle('is-flipped', flipped);

  if (!entry) {
    document.getElementById('cardWord').textContent = 'No words';
    document.getElementById('cardPos').textContent = '';
    document.getElementById('cardPron').textContent = '';
    document.getElementById('cardDef').textContent = 'Try a different filter.';
    document.getElementById('cardExample').textContent = '';
    return;
  }

  const meta = STATUS_META[getStatus(entry.word)] || STATUS_META.new;
  const badge = document.getElementById('frontBadge');
  badge.textContent = meta.label;
  badge.style.color = meta.color; badge.style.background = meta.bg;

  document.getElementById('cardWord').textContent = entry.word;
  document.getElementById('cardPos').textContent = entry.pos || '';
  document.getElementById('cardPron').textContent = entry.pronunciation || '';
  document.getElementById('cardWordBack').textContent = entry.word;
  document.getElementById('cardDef').textContent = entry.definition;
  document.getElementById('cardExample').textContent = entry.example ? '"' + entry.example + '"' : '';

  const fav = isFav(entry.word);
  ['frontStar', 'backStar'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle('on', fav);
    el.innerHTML = Icon.star(fav);
  });

  document.getElementById('prevBtn').disabled = currentIndex === 0;
}

function flip() { flipped = !flipped; document.getElementById('flashcard').classList.toggle('is-flipped', flipped); }
function advance(dir) {
  const deck = buildDeck();
  flipped = false;
  currentIndex = Math.max(0, Math.min(deck.length - 1, currentIndex + dir));
  renderStudy();
}
function markWord(status) {
  const deck = buildDeck();
  const entry = deck[currentIndex];
  if (!entry) return;
  const markedWord = entry.word;
  setStatus(markedWord, status);
  recordReview();
  // After re-statusing, the word may no longer match the active filter
  // (e.g. "New"/"Learning"), which collapses the deck so currentIndex already
  // points to the next card. Only advance when the word is still in the deck
  // (e.g. "All") — otherwise advancing would skip the card that slid in.
  const nextDeck = buildDeck();
  const stillInDeck = nextDeck[currentIndex] && nextDeck[currentIndex].word === markedWord;
  flipped = false;
  if (currentIndex > nextDeck.length - 1) currentIndex = Math.max(0, nextDeck.length - 1);
  renderStudy();
  if (stillInDeck) setTimeout(() => advance(1), 120);
}
function favCurrent() {
  const deck = buildDeck();
  const entry = deck[currentIndex];
  if (!entry) return;
  const wasOn = isFav(entry.word);
  toggleFav(entry.word);
  renderStudy();
  updateFavBadge();
  if (!wasOn) {
    ['frontStar', 'backStar'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('pop');
    });
    clearTimeout(favTimer);
    favTimer = setTimeout(() => {
      document.getElementById('frontStar').classList.remove('pop');
      document.getElementById('backStar').classList.remove('pop');
    }, 520);
  }
}
function toggleShuffle() {
  state.shuffled = !state.shuffled;
  if (state.shuffled) {
    const a = getOrder().slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    state.order = a;
  } else {
    state.order = VOCAB.map(w => w.word); // restore original sequential order
  }
  saveState();
  currentIndex = 0; flipped = false;
  renderStudy();
}
function setFilter(f) { filter = f; currentIndex = 0; flipped = false; renderStudy(); }

// ── Render: word rows ─────────────────────────────────────────
function rowHTML(w) {
  const meta = STATUS_META[getStatus(w.word)] || STATUS_META.new;
  const fav = isFav(w.word);
  const def = (w.definition || '');
  return `<div class="lex-row" data-word="${encodeURIComponent(w.word)}">
    <div class="lex-row-dot" style="background:${meta.color}"></div>
    <div class="lex-row-main">
      <div class="lex-row-word">${w.word}</div>
      <div class="lex-row-def">${def}</div>
    </div>
    <button class="lex-star sm${fav ? ' on' : ''}" data-fav="${encodeURIComponent(w.word)}" aria-label="Favorite">${Icon.star(fav)}</button>
  </div>`;
}
function bindRows(container) {
  container.querySelectorAll('.lex-row').forEach(row => {
    row.addEventListener('click', () => openWord(decodeURIComponent(row.dataset.word)));
  });
  container.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(decodeURIComponent(btn.dataset.fav));
      updateFavBadge();
      if (tab === 'browse') renderBrowse();
      if (tab === 'fav') renderFav();
    });
  });
}

function renderBrowse() {
  document.getElementById('browseCount').textContent = VOCAB.length;
  const q = searchTerm.toLowerCase();
  const list = VOCAB.filter(w => !q
    || w.word.toLowerCase().includes(q)
    || (w.definition || '').toLowerCase().includes(q));
  const el = document.getElementById('browseList');
  el.innerHTML = list.length
    ? list.map(rowHTML).join('')
    : '<div class="lex-empty">No matches.</div>';
  bindRows(el);
}

function renderFav() {
  const list = VOCAB.filter(w => isFav(w.word));
  document.getElementById('favCountLabel').textContent =
    list.length + (list.length === 1 ? ' word saved' : ' words saved');
  const body = document.getElementById('favBody');
  if (list.length === 0) {
    body.className = 'lex-fav-empty';
    body.innerHTML = `<div class="lex-fav-star">${Icon.star(false, 40)}</div>
      <div class="lex-fav-empty-t">No favorites yet</div>
      <div class="lex-fav-empty-s">Tap the star on any card to keep a word here.</div>
      <button class="lex-chip on" id="favBrowseBtn" style="margin-top:18px">Browse words</button>`;
    document.getElementById('favBrowseBtn').addEventListener('click', () => setTab('browse'));
  } else {
    body.className = 'lex-scroll';
    body.innerHTML = list.map(rowHTML).join('');
    bindRows(body);
  }
}

function renderProgress() {
  const c = counts();
  const total = DECK_TOTAL;
  const pct = Math.round(c.known / total * 100);
  const R = 78, C = 2 * Math.PI * R;
  document.getElementById('ringLearn').setAttribute('stroke-dasharray',
    (C * ((c.known + c.learning) / total)) + ' ' + C);
  document.getElementById('ringKnown').setAttribute('stroke-dasharray',
    (C * (c.known / total)) + ' ' + C);
  document.getElementById('ringPct').textContent = pct;
  document.getElementById('pKnown').textContent = c.known;
  document.getElementById('pLearning').textContent = c.learning;
  document.getElementById('pRemaining').textContent = c.remaining;
  document.getElementById('streakDays').textContent = state.streak;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('reviewedToday').textContent = (state.reviewedDate === today) ? state.reviewedToday : 0;
  document.getElementById('deckSize').textContent = DECK_TOTAL;
}

// ── Favorites tab badge ──────────────────────────────────────
function updateFavBadge() {
  const ico = document.getElementById('tabIcoFav');
  const active = tab === 'fav';
  ico.innerHTML = Icon.tabFav(active);
  if (state.favs.length > 0) {
    ico.innerHTML += `<span class="lex-tab-badge">${state.favs.length}</span>`;
  }
}

// ── Tabs ──────────────────────────────────────────────────────
const SCREENS = { study: 'studyScreen', browse: 'browseScreen', fav: 'favScreen', progress: 'progressScreen' };
function setTab(name) {
  tab = name;
  Object.keys(SCREENS).forEach(k => {
    document.getElementById(SCREENS[k]).classList.toggle('on', k === name);
  });
  document.querySelectorAll('.lex-tab[data-tab]').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  renderTabIcons();
  if (name === 'study') renderStudy();
  if (name === 'browse') renderBrowse();
  if (name === 'fav') renderFav();
  if (name === 'progress') renderProgress();
}
function renderTabIcons() {
  document.getElementById('tabIcoStudy').innerHTML = Icon.tabStudy(tab === 'study');
  document.getElementById('tabIcoBrowse').innerHTML = Icon.tabBrowse(tab === 'browse');
  document.getElementById('tabIcoProgress').innerHTML = Icon.tabProgress(tab === 'progress');
  updateFavBadge();
}

function openWord(word) {
  filter = 'all';
  flipped = false;
  const pos = getOrder().indexOf(word);
  currentIndex = pos >= 0 ? pos : 0;
  setTab('study');
}

// ── Static icon injection ────────────────────────────────────
document.getElementById('shuffleBtn').innerHTML = Icon.shuffle();
document.getElementById('searchIco').innerHTML = Icon.search();
document.getElementById('frontSpeak').innerHTML = Icon.speaker();
document.getElementById('backSpeak').innerHTML = Icon.speaker();
document.getElementById('prevBtn').innerHTML = Icon.arrowL() + ' Prev';
document.getElementById('skipBtn').innerHTML = 'Next ' + Icon.arrowR();

// ── Event wiring ─────────────────────────────────────────────
document.getElementById('cardWrap').addEventListener('click', flip);
['frontStar', 'backStar'].forEach(id =>
  document.getElementById(id).addEventListener('click', (e) => { e.stopPropagation(); favCurrent(); }));
['frontSpeak', 'backSpeak'].forEach(id =>
  document.getElementById(id).addEventListener('click', function (e) {
    e.stopPropagation();
    const deck = buildDeck();
    const entry = deck[currentIndex];
    if (entry) speak(entry.word, this);
  }));
document.querySelectorAll('#filterChips .lex-chip[data-filter]').forEach(b =>
  b.addEventListener('click', () => setFilter(b.dataset.filter)));
document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);
document.getElementById('markLearning').addEventListener('click', () => markWord('learning'));
document.getElementById('markKnown').addEventListener('click', () => markWord('known'));
document.getElementById('prevBtn').addEventListener('click', () => advance(-1));
document.getElementById('skipBtn').addEventListener('click', () => advance(1));
document.getElementById('searchBox').addEventListener('input', (e) => { searchTerm = e.target.value; renderBrowse(); });
document.querySelectorAll('.lex-tab[data-tab]').forEach(b =>
  b.addEventListener('click', () => setTab(b.dataset.tab)));
document.getElementById('segLight').addEventListener('click', () => setTheme('manuscript'));
document.getElementById('segDark').addEventListener('click', () => setTheme('dusk'));

// ── Init ──────────────────────────────────────────────────────
applyTheme();
renderTabIcons();
renderStudy();
saveState();
</script>
</body>
</html>
