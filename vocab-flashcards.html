<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #FAFAF7;
    --card-bg: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #9A9A9A;
    --accent: #2D2D2D;
    --accent-light: #E8E8E4;
    --border: #E5E5E0;
    --success: #4A7C59;
    --success-light: #EDF5EF;
    --warning: #8B6914;
    --warning-light: #FDF8EC;
    --error: #9B3B3B;
    --error-light: #FAEFEF;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 12px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .nav button {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 8px;
    transition: var(--transition);
  }

  .nav button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .nav button:hover:not(.active) {
    background: var(--accent-light);
    color: var(--text-primary);
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 28px;
    padding: 16px 0;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  /* Flashcard */
  .card-container {
    perspective: 1200px;
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .flashcard {
    position: relative;
    width: 100%;
    min-height: 320px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    text-align: center;
  }

  .card-back {
    transform: rotateY(180deg);
  }

  .card-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .card-pos {
    font-size: 0.72rem;
    font-style: italic;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .card-pronunciation {
    font-size: 0.78rem;
    color: var(--text-tertiary);
    font-style: italic;
  }

  .card-hint {
    font-size: 0.7rem;
    color: var(--text-tertiary);
    margin-top: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-definition {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text-primary);
    margin-bottom: 20px;
  }

  .card-example {
    font-size: 0.82rem;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 90%;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .card-number {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 0.68rem;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
  }

  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    margin-top: 12px;
  }

  .speak-btn:hover {
    border-color: var(--accent);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  .speak-btn.speaking {
    border-color: var(--accent);
    color: var(--text-primary);
    animation: pulse-ring 1s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(45,45,45,0.1); }
    50% { box-shadow: 0 0 0 6px rgba(45,45,45,0); }
  }

  .card-mastery {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .mastery-new { background: var(--accent-light); color: var(--text-secondary); }
  .mastery-learning { background: var(--warning-light); color: var(--warning); }
  .mastery-known { background: var(--success-light); color: var(--success); }

  /* Controls */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 12px 28px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  .btn-know {
    border-color: var(--success);
    color: var(--success);
  }

  .btn-know:hover {
    background: var(--success-light);
    border-color: var(--success);
  }

  .btn-unsure {
    border-color: var(--warning);
    color: var(--warning);
  }

  .btn-unsure:hover {
    background: var(--warning-light);
  }

  .btn-skip {
    border-color: var(--border);
    color: var(--text-tertiary);
  }

  .nav-controls {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 8px;
  }

  .nav-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    background: none;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    padding: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: var(--transition);
  }

  .nav-btn:hover { color: var(--text-primary); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Progress Bar */
  .progress-container {
    margin-bottom: 28px;
  }

  .progress-bar {
    height: 2px;
    background: var(--accent-light);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s ease;
    border-radius: 1px;
  }

  .progress-text {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-tertiary);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* List View */
  .list-view {
    display: none;
  }

  .list-view.active { display: block; }
  .card-view.active { display: block; }
  .card-view { display: none; }
  .stats-view { display: none; }
  .stats-view.active { display: block; }

  .filter-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 6px;
    cursor: pointer;
    transition: var(--transition);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .search-box {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text-primary);
    outline: none;
    margin-bottom: 16px;
    transition: var(--transition);
  }

  .search-box:focus {
    border-color: var(--accent);
    box-shadow: var(--shadow-sm);
  }

  .search-box::placeholder { color: var(--text-tertiary); }

  .word-list {
    list-style: none;
  }

  .word-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: var(--transition);
  }

  .word-item:hover { padding-left: 8px; }

  .word-item-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .word-item-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text-primary);
  }

  .word-item-pos {
    font-size: 0.7rem;
    font-style: italic;
    color: var(--text-tertiary);
  }

  .word-item-def {
    font-size: 0.78rem;
    color: var(--text-secondary);
    max-width: 55%;
    text-align: right;
    line-height: 1.4;
  }

  .word-item-badge {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Stats View */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .stats-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }

  .stats-card .stat-value {
    font-size: 2rem;
  }

  .streak-display {
    text-align: center;
    margin-bottom: 32px;
    padding: 32px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .streak-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1;
  }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    padding: 10px 24px;
    border: 1px solid var(--error);
    background: transparent;
    color: var(--error);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 24px;
  }

  .reset-btn:hover {
    background: var(--error-light);
  }

  /* Session Mode Selector */
  .session-options {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .session-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
  }

  .session-btn.active {
    border-color: var(--accent);
    color: var(--text-primary);
    background: var(--accent-light);
  }

  /* Keyboard hints */
  .keyboard-hints {
    text-align: center;
    margin-top: 20px;
    font-size: 0.65rem;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
  }

  .keyboard-hints kbd {
    display: inline-block;
    padding: 2px 6px;
    background: var(--accent-light);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    margin: 0 2px;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .app { padding: 24px 16px; }
    .card-word { font-size: 2rem; }
    .card-face { padding: 36px 24px; }
    .stats-bar { gap: 20px; }
    .word-item-def { max-width: 45%; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Lexicon</h1>
    <div class="subtitle">after David Foster Wallace</div>
  </div>

  <div class="nav">
    <button class="active" onclick="switchView('card')">Study</button>
    <button onclick="switchView('list')">Browse</button>
    <button onclick="switchView('stats')">Progress</button>
  </div>

  <!-- CARD VIEW -->
  <div class="card-view active" id="cardView">
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="knownCount">0</div>
        <div class="stat-label">Known</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="learningCount">0</div>
        <div class="stat-label">Learning</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="remainingCount">0</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>

    <div class="session-options">
      <button class="session-btn active" onclick="setSessionMode('all')">All Words</button>
      <button class="session-btn" onclick="setSessionMode('new')">New Only</button>
      <button class="session-btn" onclick="setSessionMode('learning')">Learning</button>
      <button class="session-btn" onclick="setSessionMode('shuffle')">Shuffle</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">1 / 100</div>
    </div>

    <div class="card-container" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-mastery mastery-new" id="cardMastery">New</div>
          <div class="card-number" id="cardNumber">1 / 100</div>
          <div class="card-word" id="cardWord">—</div>
          <div class="card-pos" id="cardPos"></div>
          <div class="card-pronunciation" id="cardPronunciation"></div>
          <button class="speak-btn" id="speakBtn" onclick="event.stopPropagation(); speakWord()" title="Pronounce word">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
          <div class="card-hint">tap to reveal</div>
        </div>
        <div class="card-face card-back">
          <div class="card-mastery mastery-new" id="cardMasteryBack">New</div>
          <div class="card-number" id="cardNumberBack">1 / 100</div>
          <div class="card-word" id="cardWordBack" style="font-size:1.6rem; margin-bottom:16px;">—</div>
          <div class="card-definition" id="cardDefinition">—</div>
          <div class="card-example" id="cardExample"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-unsure" onclick="markWord('learning')">Still Learning</button>
      <button class="btn btn-know" onclick="markWord('known')">Know It</button>
    </div>

    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()">&#8592; Prev</button>
      <button class="nav-btn" onclick="skipCard()">Skip &#8594;</button>
    </div>

    <div class="keyboard-hints">
      <kbd>Space</kbd> flip &nbsp; <kbd>&#8592;</kbd> prev &nbsp; <kbd>&#8594;</kbd> next &nbsp; <kbd>1</kbd> learning &nbsp; <kbd>2</kbd> known &nbsp; <kbd>S</kbd> speak
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <input type="text" class="search-box" placeholder="Search words..." oninput="filterList(this.value)" id="searchBox">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setListFilter('all')">All</button>
      <button class="filter-btn" onclick="setListFilter('new')">New</button>
      <button class="filter-btn" onclick="setListFilter('learning')">Learning</button>
      <button class="filter-btn" onclick="setListFilter('known')">Known</button>
    </div>
    <ul class="word-list" id="wordList"></ul>
  </div>

  <!-- STATS VIEW -->
  <div class="stats-view" id="statsView">
    <div class="streak-display">
      <div class="stat-label" style="margin-bottom:8px">Current Streak</div>
      <div class="streak-number" id="streakNumber">0</div>
      <div class="stat-label" style="margin-top:4px">days</div>
    </div>

    <div class="stats-grid">
      <div class="stats-card">
        <div class="stat-value" id="statsKnown">0</div>
        <div class="stat-label">Mastered</div>
      </div>
      <div class="stats-card">
        <div class="stat-value" id="statsLearning">0</div>
        <div class="stat-label">Learning</div>
      </div>
      <div class="stats-card">
        <div class="stat-value" id="statsNew">0</div>
        <div class="stat-label">Unseen</div>
      </div>
      <div class="stats-card">
        <div class="stat-value" id="statsSessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>

    <div style="text-align:center">
      <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
    </div>
  </div>
</div>

<script>
const VOCAB = [
  { word: "sesquipedalian", pos: "adj.", pronunciation: "/ˌsɛs.kwɪ.pɪˈdeɪ.li.ən/", definition: "Given to or characterized by the use of long words; polysyllabic to excess.", example: "His sesquipedalian tendencies made even casual conversation feel like a doctoral defense." },
  { word: "anfractuous", pos: "adj.", pronunciation: "/ænˈfræk.tʃu.əs/", definition: "Sinuous, winding; full of twists and turns, both literally and figuratively.", example: "The anfractuous logic of the argument required three readings to follow." },
  { word: "apothegm", pos: "n.", pronunciation: "/ˈæp.ə.θɛm/", definition: "A concise, pithy saying or maxim; a terse remark conveying some important truth.", example: "He collected apothegms the way others collected stamps — obsessively and without clear purpose." },
  { word: "crepuscular", pos: "adj.", pronunciation: "/krɪˈpʌs.kjə.lər/", definition: "Of, resembling, or relating to twilight; dim, indistinct.", example: "The crepuscular light gave everything a quality of being not-quite-real." },
  { word: "defenestrate", pos: "v.", pronunciation: "/diːˈfɛn.ɪ.streɪt/", definition: "To throw (a person or thing) out of a window; figuratively, to dismiss summarily.", example: "She mentally defenestrated every assumption she'd held about the project." },
  { word: "diaphanous", pos: "adj.", pronunciation: "/daɪˈæf.ə.nəs/", definition: "Light, delicate, and translucent; so fine as to be almost transparent.", example: "The diaphanous curtain did nothing to block the interrogative midwestern sun." },
  { word: "effulgent", pos: "adj.", pronunciation: "/ɪˈfʌl.dʒənt/", definition: "Shining brightly; radiant, resplendent.", example: "Her effulgent confidence was almost painful to witness up close." },
  { word: "enervate", pos: "v.", pronunciation: "/ˈɛn.ər.veɪt/", definition: "To weaken or drain of energy, vitality, or strength.", example: "The relentless humidity enervated everyone except the flies." },
  { word: "epistemic", pos: "adj.", pronunciation: "/ˌɛp.ɪˈstɛm.ɪk/", definition: "Relating to knowledge or the conditions for acquiring it.", example: "The epistemic uncertainty was the whole point — not a bug but a feature of the inquiry." },
  { word: "equipoise", pos: "n.", pronunciation: "/ˈɛk.wɪ.pɔɪz/", definition: "A state of balance or equilibrium; counterbalancing weight or force.", example: "He maintained an equipoise between sincerity and irony that was itself a kind of art form." },
  { word: "etiolate", pos: "v.", pronunciation: "/ˈiː.ti.ə.leɪt/", definition: "To make pale and weak, especially through deprivation of light; to drain of vigor.", example: "Years of fluorescent-lit cubicle work had etiolated his once-robust enthusiasm for anything." },

// State
let state = loadState();
let currentIndex = 0;
let sessionQueue = [];
let sessionMode = 'all';
let listFilter = 'all';
let searchTerm = '';

function defaultState() {
  return {
    words: {},
    sessions: 0,
    streak: 0,
    lastDate: null,
    firstUsed: new Date().toISOString()
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem('lexicon_state');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('lexicon_state', JSON.stringify(state));
}

function getWordState(word) {
  return state.words[word] || { status: 'new', seen: 0, lastSeen: null };
}

function setWordState(word, status) {
  const ws = getWordState(word);
  ws.status = status;
  ws.seen = (ws.seen || 0) + 1;
  ws.lastSeen = new Date().toISOString();
  state.words[word] = ws;
  saveState();
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (state.lastDate === yesterday) {
    state.streak++;
  } else if (state.lastDate !== today) {
    state.streak = 1;
  }
  state.lastDate = today;
  state.sessions++;
  saveState();
}

// Queue management
function buildQueue() {
  let pool;
  switch(sessionMode) {
    case 'new':
      pool = VOCAB.filter(w => getWordState(w.word).status === 'new');
      break;
    case 'learning':
      pool = VOCAB.filter(w => getWordState(w.word).status === 'learning');
      break;
    case 'shuffle':
      pool = [...VOCAB];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      break;
    default:
      pool = [...VOCAB];
  }
  sessionQueue = pool;
  currentIndex = 0;
}

function setSessionMode(mode) {
  sessionMode = mode;
  document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  buildQueue();
  renderCard();
}

// Card rendering
function renderCard() {
  if (sessionQueue.length === 0) {
    document.getElementById('cardWord').textContent = 'No words';
    document.getElementById('cardPos').textContent = '';
    document.getElementById('cardPronunciation').textContent = '';
    document.getElementById('cardDefinition').textContent = 'Try a different filter.';
    document.getElementById('cardExample').textContent = '';
    return;
  }

  const word = sessionQueue[currentIndex];
  const ws = getWordState(word.word);

  // Unflip
  document.getElementById('flashcard').classList.remove('flipped');

  // Front
  document.getElementById('cardWord').textContent = word.word;
  document.getElementById('cardPos').textContent = word.pos;
  document.getElementById('cardPronunciation').textContent = word.pronunciation;
  document.getElementById('cardNumber').textContent = `${currentIndex + 1} / ${sessionQueue.length}`;

  // Back
  document.getElementById('cardWordBack').textContent = word.word;
  document.getElementById('cardDefinition').textContent = word.definition;
  document.getElementById('cardExample').textContent = word.example ? `"${word.example}"` : '';
  document.getElementById('cardNumberBack').textContent = `${currentIndex + 1} / ${sessionQueue.length}`;

  // Mastery badges
  const masteryClass = ws.status === 'known' ? 'mastery-known' : ws.status === 'learning' ? 'mastery-learning' : 'mastery-new';
  const masteryText = ws.status === 'known' ? 'Known' : ws.status === 'learning' ? 'Learning' : 'New';
  ['cardMastery', 'cardMasteryBack'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'card-mastery ' + masteryClass;
    el.textContent = masteryText;
  });

  // Progress
  const progress = sessionQueue.length > 0 ? ((currentIndex + 1) / sessionQueue.length * 100) : 0;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${sessionQueue.length}`;

  // Prev button
  document.getElementById('prevBtn').disabled = currentIndex === 0;

  updateStats();
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

let preferredVoice = null;
function loadVoice() {
  const voices = speechSynthesis.getVoices();
  preferredVoice = voices.find(v => v.name.includes('Google US English'))
    || voices.find(v => v.name.includes('Google UK English'))
    || voices.find(v => /english/i.test(v.name) && v.lang.startsWith('en'));
}
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

function speakWord() {
  if (sessionQueue.length === 0) return;
  speechSynthesis.cancel();
  const word = sessionQueue[currentIndex].word;
  const utterance = new SpeechSynthesisUtterance(word);
  if (preferredVoice) utterance.voice = preferredVoice;
  utterance.rate = 0.85;
  utterance.pitch = 1;
  const btn = document.getElementById('speakBtn');
  btn.classList.add('speaking');
  utterance.onend = () => btn.classList.remove('speaking');
  utterance.onerror = () => btn.classList.remove('speaking');
  speechSynthesis.speak(utterance);
}

function markWord(status) {
  if (sessionQueue.length === 0) return;
  const word = sessionQueue[currentIndex];
  setWordState(word.word, status);
  updateStreak();
  nextCard();
}

function nextCard() {
  if (currentIndex < sessionQueue.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    currentIndex = 0;
    renderCard();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function skipCard() {
  nextCard();
}

function updateStats() {
  let known = 0, learning = 0, newCount = 0;
  VOCAB.forEach(w => {
    const s = getWordState(w.word).status;
    if (s === 'known') known++;
    else if (s === 'learning') learning++;
    else newCount++;
  });

  document.getElementById('knownCount').textContent = known;
  document.getElementById('learningCount').textContent = learning;
  document.getElementById('remainingCount').textContent = newCount;

  // Stats view
  document.getElementById('statsKnown').textContent = known;
  document.getElementById('statsLearning').textContent = learning;
  document.getElementById('statsNew').textContent = newCount;
  document.getElementById('statsSessions').textContent = state.sessions;
  document.getElementById('streakNumber').textContent = state.streak;
}

// View switching
function switchView(view) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('cardView').classList.toggle('active', view === 'card');
  document.getElementById('listView').classList.toggle('active', view === 'list');
  document.getElementById('statsView').classList.toggle('active', view === 'stats');
  if (view === 'list') renderList();
  if (view === 'stats') updateStats();
}

// List view
function renderList() {
  const list = document.getElementById('wordList');
  let filtered = VOCAB.filter(w => {
    const s = getWordState(w.word).status;
    if (listFilter !== 'all' && s !== listFilter) return false;
    if (searchTerm && !w.word.toLowerCase().includes(searchTerm.toLowerCase()) && !w.definition.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });

  list.innerHTML = filtered.map(w => {
    const s = getWordState(w.word).status;
    const badgeClass = s === 'known' ? 'mastery-known' : s === 'learning' ? 'mastery-learning' : 'mastery-new';
    const badgeText = s === 'known' ? 'Known' : s === 'learning' ? 'Learning' : 'New';
    return `<li class="word-item" onclick="jumpToWord('${w.word}')">
      <div class="word-item-left">
        <span class="word-item-word">${w.word}</span>
        <span class="word-item-pos">${w.pos}</span>
        <span class="word-item-badge ${badgeClass}">${badgeText}</span>
      </div>
      <span class="word-item-def">${w.definition.substring(0, 60)}${w.definition.length > 60 ? '…' : ''}</span>
    </li>`;
  }).join('');
}

function filterList(term) {
  searchTerm = term;
  renderList();
}

function setListFilter(filter) {
  listFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function jumpToWord(word) {
  sessionMode = 'all';
  buildQueue();
  const idx = sessionQueue.findIndex(w => w.word === word);
  if (idx >= 0) currentIndex = idx;
  switchViewDirect('card');
  renderCard();
}

function switchViewDirect(view) {
  document.querySelectorAll('.nav button').forEach((b, i) => {
    b.classList.toggle('active', (view === 'card' && i === 0) || (view === 'list' && i === 1) || (view === 'stats' && i === 2));
  });
  document.getElementById('cardView').classList.toggle('active', view === 'card');
  document.getElementById('listView').classList.toggle('active', view === 'list');
  document.getElementById('statsView').classList.toggle('active', view === 'stats');
}

function resetProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    state = defaultState();
    saveState();
    buildQueue();
    renderCard();
    updateStats();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ':
      e.preventDefault();
      flipCard();
      break;
    case 'ArrowRight':
      e.preventDefault();
      nextCard();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevCard();
      break;
    case '1':
      markWord('learning');
      break;
    case '2':
      markWord('known');
      break;
    case 's':
    case 'S':
      speakWord();
      break;
  }
});

// Init
buildQueue();
renderCard();
updateStats();
</script>

</body>
</html>
